name: CI

on:
  push:
  pull_request:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run with Docker Compose
        run: |
          docker compose up --build --exit-code-from tests

      - name: Shutdown
        if: always()
        run: docker compose down -v